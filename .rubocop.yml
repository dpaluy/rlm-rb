AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "pkg/**/*"
    - "Gemfile.lock"

# Specs and tests
Metrics/BlockLength:
  Exclude:
    - "test/**/*"
    - "*.gemspec"

Metrics/ClassLength:
  Max: 250

Metrics/MethodLength:
  Max: 25

Metrics/AbcSize:
  Max: 25

Metrics/ParameterLists:
  Max: 10
  CountKeywordArgs: false

Layout/LineLength:
  Max: 120

# Convention for option-rich DSLs and result/event objects in this gem
Naming/MethodParameterName:
  AllowedNames:
    - io
    - id
    - to
    - by
    - on
    - in
    - at
    - "_"
    - e
    - f
    - i
    - n
    - k
    - v
    - lm
    - a
    - b

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# Tests use compact `class RLM::FooTest` style on purpose
Style/ClassAndModuleChildren:
  Exclude:
    - "test/**/*"

# Predicate methods with `?` suffix that don't simply test state
Naming/PredicatePrefix:
  Enabled: false
